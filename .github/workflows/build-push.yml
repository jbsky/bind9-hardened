# =====================================================================
#  Build & Push – BIND9 Hardened
#  Multi-stage FROM scratch → ghcr.io + Docker Hub
#  Lint + Build + Sign (cosign OIDC) + Scan (Trivy) + Release
# =====================================================================
name: build-push

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'Dockerfile'
      - 'init.go'
      - 'go.mod'
      - 'versions.json'
      - '.github/workflows/build-push.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}
  IMAGE_NAME: bind9-hardened

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

jobs:
  # -------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          set -euo pipefail
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  # -------------------------------------------------------------------
  validate:
    name: Validate build (PR)
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha,scope=bind9
          cache-to: type=gha,mode=max,scope=bind9

  # -------------------------------------------------------------------
  #  Builds amd64 once. On a real push/tag (never on pull_request -- fork
  #  PRs must not get registry credentials) it's pushed BY DIGEST, so
  #  `test` below can pull back that exact digest and run the functional
  #  tests against those literal bytes -- not a separately-built image
  #  that "should" match thanks to cache. `promote` merges that same
  #  digest with build-arm64's into the final multi-arch manifest; amd64
  #  never gets rebuilt between "tested" and "shipped" (arm64 can't be
  #  functionally tested here at all -- would need slow, less reliable
  #  QEMU-emulated containers -- so it's still just built, not tested). On
  #  a PR there's no registry to push to, so the image is instead
  #  exported to a local tarball and handed to `test` (a separate
  #  job/runner) as an artifact.
  # -------------------------------------------------------------------
  build:
    name: Build image
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      PUBLISH: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v7

      - name: Read versions
        id: versions
        run: |
          set -euo pipefail
          BIND_VER=$(jq -r '.bind' versions.json)
          echo "bind=${BIND_VER}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login ghcr.io
        if: env.PUBLISH == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Make room for local tarball export (PR only)
        if: env.PUBLISH != 'true'
        run: mkdir -p /tmp/image-tar

      - name: Build (push-by-digest, or local tarball on PR)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          outputs: ${{ env.PUBLISH == 'true' && format('type=image,name={0}/{1}/{2},push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, env.NAMESPACE, env.IMAGE_NAME) || 'type=docker,dest=/tmp/image-tar/image.tar' }}
          tags: ${{ env.PUBLISH != 'true' && 'bind9-hardened:test' || '' }}
          build-args: |
            BIND_VERSION=${{ steps.versions.outputs.bind }}
          sbom: ${{ env.PUBLISH }}
          provenance: ${{ env.PUBLISH == 'true' && 'mode=max' || 'false' }}
          cache-from: type=gha,scope=bind9-linux/amd64
          cache-to: type=gha,mode=max,scope=bind9-linux/amd64

      - name: Upload image tarball (PR only, for the test job)
        if: env.PUBLISH != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: image-tar
          path: /tmp/image-tar/image.tar
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------
  #  Loads the exact bytes `build` just produced (pulled by digest from
  #  the registry, or loaded from its tarball artifact on a PR) and runs
  #  the functional tests against them.
  # -------------------------------------------------------------------
  test:
    name: Functional tests
    needs: build
    runs-on: ubuntu-latest
    env:
      PUBLISH: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v7

      - name: Login ghcr.io
        if: env.PUBLISH == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built digest for testing
        if: env.PUBLISH == 'true'
        run: |
          set -euo pipefail
          docker pull "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}"
          docker tag  "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}" bind9-hardened:test

      - name: Download image tarball (PR only)
        if: env.PUBLISH != 'true'
        uses: actions/download-artifact@v8
        with:
          name: image-tar
          path: /tmp/image-tar

      - name: Load image tarball (PR only)
        if: env.PUBLISH != 'true'
        run: docker load -i /tmp/image-tar/image.tar

      - name: Run smoke tests
        run: ./scripts/test.sh bind9-hardened:test

  # -------------------------------------------------------------------
  #  arm64 companion build -- cross-compiled via QEMU, can't be
  #  functionally tested here, pushed by digest for promote to merge.
  # -------------------------------------------------------------------
  build-arm64:
    name: Build arm64
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - name: Read versions
        id: versions
        run: |
          set -euo pipefail
          BIND_VER=$(jq -r '.bind' versions.json)
          echo "bind=${BIND_VER}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          sbom: true
          provenance: mode=max
          build-args: |
            BIND_VERSION=${{ steps.versions.outputs.bind }}
          outputs: type=image,"name=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=bind9-linux/arm64
          cache-to: type=gha,mode=max,scope=bind9-linux/arm64

  # -------------------------------------------------------------------
  #  Merges build's tested amd64 digest with build-arm64's digest into the
  #  final multi-arch manifest -- no rebuild of either.
  # -------------------------------------------------------------------
  promote:
    name: Promote tested digests
    needs: [build, test, build-arm64]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}

    steps:
      - uses: actions/checkout@v7

      - name: Read versions
        id: versions
        run: |
          set -euo pipefail
          BIND_VER=$(jq -r '.bind' versions.json)
          echo "bind=${BIND_VER}" >> "$GITHUB_OUTPUT"
          echo "### Resolved versions" >> "$GITHUB_STEP_SUMMARY"
          echo "- BIND: ${BIND_VER}" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Docker Hub credentials
        id: dockerhub
        run: |
          if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login Docker Hub
        if: steps.dockerhub.outputs.available == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker Hub image name
        id: dockerhub-image
        if: steps.dockerhub.outputs.available == 'true'
        env:
          DOCKERHUB_NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: echo "image=docker.io/${DOCKERHUB_NS}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}
            ${{ steps.dockerhub-image.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ steps.versions.outputs.bind }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest from tested digests (no rebuild)
        id: manifest
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}"
          TAGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAGS="${TAGS} -t ${tag}"
          done <<< "${{ steps.meta.outputs.tags }}"
          docker buildx imagetools create ${TAGS} \
            "${IMAGE}@${{ needs.build.outputs.digest }}" \
            "${IMAGE}@${{ needs.build-arm64.outputs.digest }}"
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${{ steps.versions.outputs.bind }}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (OIDC keyless)
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
          HAS_DOCKERHUB: ${{ steps.dockerhub.outputs.available }}
          DOCKERHUB_NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          if [ "$HAS_DOCKERHUB" = "true" ]; then
            COSIGN_REPOSITORY="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}" \
              cosign sign --yes "docker.io/${DOCKERHUB_NS}/${{ env.IMAGE_NAME }}@${DIGEST}"
          fi

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}
          format: sarif
          output: trivy-bind9.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-bind9.sarif
          category: bind9

      - name: GitHub SLSA Attestation
        if: "!startsWith(github.ref, 'refs/heads/dependabot/')"
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Summary
        env:
          HAS_DOCKERHUB: ${{ steps.dockerhub.outputs.available }}
          DOCKERHUB_NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          echo "### bind9-hardened" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.manifest.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          if [ "$HAS_DOCKERHUB" = "true" ]; then
            echo "docker pull docker.io/${DOCKERHUB_NS}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------
  cleanup:
    name: Prune old registry tags
    needs: promote
    uses: ./.github/workflows/registry-cleanup.yml
    secrets: inherit

  # -------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: promote
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Tarball + checksums
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar --exclude='.git' --exclude='dist' \
              -czf "dist/bind9-hardened-${VERSION}.tar.gz" \
              --transform "s,^,bind9-hardened-${VERSION}/," \
              $(ls -A | grep -v -E '^(\.git|dist)$')
          cd dist
          sha256sum "bind9-hardened-${VERSION}.tar.gz" > "bind9-hardened-${VERSION}.sha256"
          sha512sum "bind9-hardened-${VERSION}.tar.gz" > "bind9-hardened-${VERSION}.sha512"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/bind9-hardened-${{ github.ref_name }}.tar.gz
            dist/bind9-hardened-${{ github.ref_name }}.sha256
            dist/bind9-hardened-${{ github.ref_name }}.sha512
